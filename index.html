<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ClearMind">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000" id="tc">
<title>ClearMind</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--nav-h:calc(76px + env(safe-area-inset-bottom,0px));}
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:#000000;}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-appearance:none;outline:none;}
input,select{font-family:inherit;outline:none;}

/* Shell */
#shell{position:fixed;inset:0;display:block;overflow:hidden;background:var(--bg,#000000);}
#scroller{position:absolute;top:0;left:0;right:0;bottom:var(--nav-h);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;background:var(--page,#000000);}
#scroller::-webkit-scrollbar{display:none;}

/* Bottom Navigation — flat rebuilt version, no hidden underlay */
#nav{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:var(--nav-h);
  z-index:140;
  background:var(--bg,#000000);
  border-top:1px solid var(--line,#202327);
  overflow:hidden;
  box-shadow:none;
}
#nav::before,
#nav::after{
  content:none!important;
  display:none!important;
}
.nav-inner{
  max-width:430px;
  height:calc(var(--nav-h) - env(safe-area-inset-bottom,0px));
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  align-items:center;
  gap:0;
  padding:18px 10px 6px;
}
.ntab{
  height:52px;
  min-width:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  border-radius:0;
  color:var(--mut,#71767b);
  position:relative;
  background:transparent!important;
  box-shadow:none!important;
  transition:color .16s ease,transform .12s cubic-bezier(.34,1.56,.64,1),opacity .16s ease;
}
.ntab:active{transform:scale(.94);}
.ntab .nav-ico{
  width:28px;
  height:25px;
  display:grid;
  place-items:center;
  border-radius:0;
  background:transparent!important;
  box-shadow:none!important;
  transition:color .16s ease,transform .16s ease,opacity .16s ease;
}
.ntab .lbl{
  font-size:10px;
  line-height:1;
  font-weight:750;
  letter-spacing:-.01em;
  opacity:.72;
  white-space:nowrap;
}
.ntab.on{
  color:var(--acc,#1d9bf0);
}
.ntab.on .nav-ico{transform:none;}
.ntab.on .lbl{opacity:1;}
.ntab-dot{display:none!important;}

/* Page */
#page-wrap{max-width:430px;margin:0 auto;padding:0 16px 32px;}

/* Topbar */
.topbar{position:sticky;top:0;z-index:10;border-bottom:1px solid;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top,0px));-webkit-backdrop-filter:blur(20px) saturate(180%);backdrop-filter:blur(20px) saturate(180%);}
.topbar-inner{max-width:430px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.topbar-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cm-badge{position:relative;width:38px;height:38px;flex-shrink:0;display:grid;place-items:center;border-radius:13px;border:1px solid;}
.cm-dot{position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;border:2.5px solid;}
.topbar-avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:13px;font-weight:800;color:#fff;background:linear-gradient(135deg,#1d9bf0,#7856ff);}
.cm-eyebrow{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cm-title{font-size:17px;font-weight:700;letter-spacing:-.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.status-chip{border-radius:99px;border:1px solid;padding:4px 10px;font-size:11px;font-weight:600;white-space:nowrap;}
.icon-btn{width:38px;height:38px;display:grid;place-items:center;border-radius:13px;border:1px solid;flex-shrink:0;transition:transform .12s;}
.icon-btn:active{transform:scale(.88);}

/* Card */
.card{border-radius:22px;border:1px solid;overflow:hidden;}

/* Progress */
.prog{height:6px;border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;transition:width .5s;}

/* Buttons */
.btn-full{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:22px;padding:15px 20px;font-size:15px;font-weight:600;color:#fff;transition:transform .12s cubic-bezier(.34,1.56,.64,1),filter .12s;}
.btn-full:active{transform:scale(.96);filter:brightness(.88);}
.btn-outline{border-radius:22px;border:1px solid;padding:15px 16px;font-size:14px;font-weight:600;transition:transform .12s;}
.btn-outline:active{transform:scale(.96);}
.btn-pill{border-radius:99px;padding:6px 13px;font-size:12px;font-weight:700;transition:transform .12s;}
.btn-pill:active{transform:scale(.94);}
.btn-row{border-radius:14px;padding:13px;font-size:14px;font-weight:700;transition:transform .12s;}
.btn-row:active{transform:scale(.97);}

/* Ring */
.ring-wrap{position:relative;flex-shrink:0;}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}

/* Focus ring */
.focus-ring{position:relative;width:230px;height:230px;margin:18px auto;display:grid;place-items:center;}
.focus-glow{position:absolute;inset:28px;border-radius:50%;filter:blur(32px);}
.focus-num{font-size:52px;font-weight:500;letter-spacing:-.055em;line-height:1;font-variant-numeric:tabular-nums;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;}

/* Toggle */
.tog{width:46px;height:27px;border-radius:99px;position:relative;flex-shrink:0;transition:background .2s;}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .22s cubic-bezier(.34,1.56,.64,1);box-shadow:0 1px 4px rgba(0,0,0,.25);}
.tog.on::after{transform:translateX(19px);}
.tog.off{background:#71767b!important;}

/* Preset */
.preset{width:100%;border-radius:16px;border:1px solid;padding:14px 16px;text-align:left;transition:transform .12s,border-color .15s,background .15s;}
.preset:active{transform:scale(.98);}

/* Tabs */
.rtabs{display:grid;grid-template-columns:repeat(4,1fr);border-radius:14px;padding:4px;}
.rtab{border-radius:10px;padding:8px 4px;font-size:12px;font-weight:500;transition:background .15s,color .15s;}

/* Theme switcher */
.tsw{display:grid;grid-template-columns:repeat(3,1fr);border-radius:99px;padding:3px;}
.tsw-btn{border-radius:99px;padding:8px;font-size:11px;font-weight:600;transition:background .15s,color .15s;}

/* Modal */
.modal-bg{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0 12px;padding-bottom:calc(var(--nav-h) + 12px);background:rgba(0,0,0,0);pointer-events:none;transition:background .28s;}
.modal-bg.open{background:rgba(0,0,0,.56);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);pointer-events:all;}
.modal-sheet{width:100%;max-width:430px;border-radius:28px;border:1px solid;padding:20px;transform:translateY(110%);transition:transform .34s cubic-bezier(.32,.72,0,1);box-shadow:0 -8px 48px rgba(0,0,0,.4);}
.modal-bg.open .modal-sheet{transform:translateY(0);}
.modal-handle{width:36px;height:4px;border-radius:99px;margin:0 auto 16px;}

/* Install sheet */
.inst-bg{position:fixed;inset:0;z-index:60;display:flex;align-items:flex-end;justify-content:center;padding:0 12px;padding-bottom:calc(var(--nav-h) + 12px);background:rgba(0,0,0,.7);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .25s;}
.inst-bg.open{opacity:1;pointer-events:all;}
.inst-sheet{width:100%;max-width:430px;border-radius:28px;border:1px solid;padding:24px;transform:translateY(100%);transition:transform .34s cubic-bezier(.32,.72,0,1);}
.inst-bg.open .inst-sheet{transform:translateY(0);}

/* Notification panel */
.notif-panel{position:fixed;inset:0;z-index:55;display:flex;flex-direction:column;padding-top:calc(env(safe-area-inset-top,0px) + 56px);background:rgba(0,0,0,0);pointer-events:none;transition:background .28s;}
.notif-panel.open{background:rgba(0,0,0,.5);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);pointer-events:all;}
.notif-inner{margin:0 12px;border-radius:24px;border:1px solid;padding:0;overflow:hidden;transform:translateY(-20px);opacity:0;transition:transform .28s cubic-bezier(.32,.72,0,1),opacity .28s;max-width:430px;align-self:center;width:calc(100% - 24px);}
.notif-panel.open .notif-inner{transform:translateY(0);opacity:1;}

/* Add limit modal */
.add-limit-bg{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:0 12px;padding-bottom:calc(var(--nav-h) + 12px);background:rgba(0,0,0,0);pointer-events:none;transition:background .28s;}
.add-limit-bg.open{background:rgba(0,0,0,.56);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);pointer-events:all;}
.add-limit-sheet{width:100%;max-width:430px;border-radius:28px;border:1px solid;padding:20px;transform:translateY(110%);transition:transform .34s cubic-bezier(.32,.72,0,1);}
.add-limit-bg.open .add-limit-sheet{transform:translateY(0);}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.fu{animation:fadeUp .26s cubic-bezier(.4,0,.2,1) both;}
.fu1{animation-delay:.03s;}.fu2{animation-delay:.07s;}.fu3{animation-delay:.12s;}
.fu4{animation-delay:.17s;}.fu5{animation-delay:.22s;}.fu6{animation-delay:.27s;}
.no-anim,.no-anim *{animation:none!important;transition:color .15s,background .15s,border-color .15s!important;}

/* Utils */
.mt3{margin-top:12px;}.mt4{margin-top:16px;}.mt5{margin-top:20px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.row{display:flex;align-items:center;}
.sb{justify-content:space-between;}

/* Settings row press feedback */
.settings-row{transition:opacity .1s;}
.settings-row:active{opacity:.5;}

/* Profile button press states */
.prf-btn-sec { transition: transform .12s cubic-bezier(.34,1.56,.64,1), opacity .1s; }
.prf-btn-sec:active { transform: scale(.95); opacity: .8; }
.prf-btn-acc { transition: transform .12s cubic-bezier(.34,1.56,.64,1), filter .12s; }
.prf-btn-acc:active { transform: scale(.95); filter: brightness(.88); }
.prf-txt-btn { transition: opacity .1s; }
.prf-txt-btn:active { opacity: .5; }
.prf-row-btn { transition: background .12s; }
.prf-row-btn:active { background: var(--surf2) !important; }
.prf-install { transition: transform .12s cubic-bezier(.34,1.56,.64,1), filter .12s; }
.prf-install:active { transform: scale(.97); filter: brightness(.88); }
.prf-signout { transition: transform .12s cubic-bezier(.34,1.56,.64,1); }
.prf-signout:active { transform: scale(.97); }


/* Immersive Focus Screen */
.focus-live{position:fixed;inset:0;z-index:90;display:none;overflow:hidden;color:#fff;background:#02040a;}
.focus-live.open{display:block;animation:focusUniverseIn .9s cubic-bezier(.16,1,.3,1) both;}
.focus-live::before{content:'';position:absolute;inset:-35%;background:
  radial-gradient(circle at 50% 50%,rgba(255,255,255,.92) 0 1px,transparent 1.6px),
  radial-gradient(circle at 18% 22%,rgba(255,255,255,.55) 0 1px,transparent 1.8px),
  radial-gradient(circle at 78% 30%,rgba(255,255,255,.38) 0 1px,transparent 1.7px),
  radial-gradient(circle at 28% 78%,rgba(255,255,255,.42) 0 1px,transparent 1.8px);
  background-size:86px 86px,132px 132px,176px 176px,214px 214px;opacity:.32;animation:starDrift 28s linear infinite;transform-origin:center;}
.focus-live::after{content:'';position:absolute;inset:0;background:
  radial-gradient(circle at 50% 43%,rgba(29,155,240,.42),transparent 24%),
  radial-gradient(circle at 30% 68%,rgba(120,86,255,.26),transparent 34%),
  linear-gradient(180deg,rgba(4,9,20,.28),rgba(0,0,0,.96));pointer-events:none;}
.focus-live.paused::after{background:radial-gradient(circle at 50% 43%,rgba(255,255,255,.10),transparent 22%),linear-gradient(180deg,rgba(10,12,18,.72),rgba(0,0,0,.98));}
@keyframes focusUniverseIn{0%{opacity:0;transform:scale(1.18);filter:blur(18px) brightness(1.8)}45%{opacity:1;filter:blur(4px) brightness(1.28)}100%{opacity:1;transform:scale(1);filter:blur(0) brightness(1)}}
@keyframes starDrift{from{transform:translate3d(0,0,0) rotate(0deg) scale(1.06)}to{transform:translate3d(-6%,7%,0) rotate(4deg) scale(1.13)}}
.focus-warp{position:absolute;inset:0;background:repeating-conic-gradient(from 0deg at 50% 46%,rgba(255,255,255,.20) 0 .22deg,transparent .28deg 7deg);mask-image:radial-gradient(circle at center,transparent 0 10%,#000 22%,transparent 65%);opacity:.18;animation:warpSpin 16s linear infinite;}
@keyframes warpSpin{to{transform:rotate(360deg)}}
.focus-orb{position:absolute;width:320px;height:320px;border-radius:50%;left:50%;top:48%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(255,255,255,.13),rgba(29,155,240,.20) 26%,rgba(120,86,255,.12) 48%,transparent 69%);filter:blur(8px);animation:orbPulse 6.5s ease-in-out infinite;}
.focus-orb.two{width:170px;height:170px;top:22%;left:82%;animation-duration:8s;opacity:.46;}
.focus-orb.three{width:150px;height:150px;top:83%;left:12%;animation-duration:9.2s;opacity:.38;}
@keyframes orbPulse{0%,100%{transform:translate(-50%,-50%) scale(.94)}50%{transform:translate(-50%,-50%) scale(1.08)}}
.focus-live-inner{position:relative;z-index:2;height:100%;max-width:430px;margin:0 auto;padding:calc(env(safe-area-inset-top,0px) + 26px) 20px calc(env(safe-area-inset-bottom,0px) + 18px);display:flex;flex-direction:column;align-items:center;justify-content:space-between;text-align:center;}
.focus-live-top{width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.focus-live-chip{border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 18px 60px rgba(0,0,0,.26);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-radius:999px;padding:8px 12px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.78);}
.focus-live-status{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.45);}
.focus-live-core{width:100%;transform:translateY(-5px);}
.focus-live-time{font-size:82px;font-weight:480;letter-spacing:-.065em;line-height:.9;font-variant-numeric:tabular-nums;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;text-shadow:0 18px 70px rgba(29,155,240,.34),0 2px 0 rgba(255,255,255,.06);}
.focus-live-sub{font-size:13px;line-height:1.55;color:rgba(255,255,255,.58);margin-top:18px;max-width:270px;margin-left:auto;margin-right:auto;}
.focus-mini-actions{display:flex;justify-content:center;gap:8px;margin-top:24px;}
.focus-mini-btn{border-radius:999px;padding:9px 12px;font-size:12px;font-weight:800;color:rgba(255,255,255,.80);border:1px solid rgba(255,255,255,.11);background:rgba(255,255,255,.06);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
.focus-control-row{width:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;}
.focus-icon-btn{width:66px;height:66px;border-radius:24px;display:grid;place-items:center;color:#05070d;background:rgba(255,255,255,.92);box-shadow:0 22px 70px rgba(29,155,240,.25),inset 0 1px 0 rgba(255,255,255,.75);transition:transform .14s cubic-bezier(.34,1.56,.64,1),filter .14s;}
.focus-icon-btn:active{transform:scale(.92);filter:brightness(.9);}
.focus-side-btn{height:48px;border-radius:18px;padding:0 12px;font-size:12px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);transition:transform .12s,background .12s;}
.focus-side-btn:active{transform:scale(.96);background:rgba(255,255,255,.11);}
.focus-live-end{color:#ff8fbf;border-color:rgba(249,24,128,.24);background:rgba(249,24,128,.08);}
.focus-pause-note{font-size:12px;color:rgba(255,255,255,.48);margin-top:15px;min-height:18px;}
.fire-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.fire-day{border-radius:15px;border:1px solid;padding:9px 2px;text-align:center;}
.fire-emoji{font-size:21px;line-height:1;filter:grayscale(1);opacity:.38;transition:filter .25s,opacity .25s,transform .25s;}
.fire-day.on .fire-emoji{filter:none;opacity:1;transform:translateY(-1px) scale(1.08);text-shadow:0 0 18px rgba(255,149,0,.55);}
.fire-label{font-size:9px;font-weight:800;margin-top:6px;letter-spacing:.03em;}


/* Persistent minimized focus banner */
.focus-dock{position:fixed;left:12px;right:12px;bottom:calc(var(--nav-h) + 18px);z-index:35;display:none;max-width:430px;margin:0 auto;pointer-events:none;}
.focus-dock.open{display:block;animation:focusDockIn .28s cubic-bezier(.16,1,.3,1) both;}
@keyframes focusDockIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.focus-dock-card{pointer-events:auto;border-radius:22px;border:1px solid rgba(255,255,255,.13);background:linear-gradient(135deg,rgba(9,13,24,.94),rgba(13,18,32,.88));box-shadow:0 18px 55px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.08);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);padding:12px;display:flex;align-items:center;gap:12px;color:#fff;}
.focus-dock-pulse{width:40px;height:40px;border-radius:15px;display:grid;place-items:center;background:radial-gradient(circle at 40% 35%,rgba(255,255,255,.75),rgba(29,155,240,.55) 18%,rgba(120,86,255,.26) 56%,rgba(255,255,255,.06));box-shadow:0 0 24px rgba(29,155,240,.32);position:relative;flex-shrink:0;}
.focus-dock-pulse::after{content:'';position:absolute;inset:9px;border-radius:50%;background:rgba(255,255,255,.78);animation:focusDockPulse 1.8s ease-in-out infinite;}
@keyframes focusDockPulse{0%,100%{transform:scale(.72);opacity:.62}50%{transform:scale(1);opacity:1}}
.focus-dock-title{font-size:11px;font-weight:850;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.55);}
.focus-dock-time{font-size:22px;font-weight:500;letter-spacing:-.045em;line-height:1.05;font-variant-numeric:tabular-nums;color:#fff;}
.focus-dock-action{border-radius:15px;padding:10px 12px;font-size:12px;font-weight:850;color:#06101f;background:rgba(255,255,255,.92);box-shadow:inset 0 1px 0 rgba(255,255,255,.7);}
.focus-dock-paused .focus-dock-pulse::after{animation:none;opacity:.45;}
.focus-dock-paused .focus-dock-card{background:linear-gradient(135deg,rgba(18,18,22,.95),rgba(9,10,13,.9));}




/* PREMIUM BOTTOM NAV — flat, lower items, no gap */
:root{--nav-base:82px;--nav-h:calc(var(--nav-base) + env(safe-area-inset-bottom,0px));}
#shell::after{content:none!important;display:none!important;}
#scroller{
  bottom:var(--nav-h)!important;
  background:var(--page,#000000)!important;
}
#nav{
  position:absolute!important;
  left:0!important;
  right:0!important;
  bottom:0!important;
  height:var(--nav-h)!important;
  z-index:150!important;
  background:linear-gradient(180deg,var(--bg,#000000) 0%,var(--bg,#000000) 100%)!important;
  border-top:1px solid color-mix(in srgb,var(--line,#202327) 82%,transparent)!important;
  border-radius:0!important;
  overflow:hidden!important;
  box-shadow:0 -1px 0 rgba(255,255,255,.025)!important;
  -webkit-backdrop-filter:none!important;
  backdrop-filter:none!important;
  transform:none!important;
}
#nav::before,#nav::after{content:none!important;display:none!important;}
.nav-inner{
  max-width:430px!important;
  height:var(--nav-base)!important;
  margin:0 auto!important;
  display:grid!important;
  grid-template-columns:repeat(5,1fr)!important;
  align-items:start!important;
  gap:0!important;
  padding:18px 12px 6px!important;
}
.ntab{
  height:58px!important;
  min-width:0!important;
  display:flex!important;
  flex-direction:column!important;
  align-items:center!important;
  justify-content:flex-start!important;
  gap:5px!important;
  border-radius:0!important;
  background:transparent!important;
  box-shadow:none!important;
  transform:translateY(3px)!important;
  opacity:.72!important;

.focus-dock{bottom:calc(var(--nav-h) + 12px)!important;z-index:120!important;}


/* Hide bottom nav during active immersive Focus Mode */

}

}

}

}

</style>

const S = {

let raf=null;
function upd(patch){
  const prevTab=S.tab, prevTheme=S.theme;
  Object.assign(S,patch);
  if(raf) return;
  raf=requestAnimationFrame(()=>{
    raf=null;
    const col=TH[S.theme]||TH.dark;
    applyTheme(col);
    drawNav(col);
    const tabChanged=S.tab!==prevTab;
    const themeChanged=S.theme!==prevTheme;
    // Skip full page re-render when only focus sub-state changed on focus tab
    if(!tabChanged && !themeChanged && S.tab==="focus") {
      drawModals(col); return;
    }
    renderPage(col, tabChanged, themeChanged);
    drawModals(col);
    drawFocusDock(col);

}

// ─── THEME ───────────────────────────────────────────────────────────────────
function applyTheme(c){
  const ds=document.documentElement.style;
  ['bg','page','surf','surf2','bdr','line','txt','mut','acc'].forEach(k=>ds.setProperty('--'+k,c[k]));
  document.getElementById('tc').content=c.bg;
  document.body.style.background=c.bg;
  const sh=document.getElementById('shell'); sh.style.background=c.bg;
  document.getElementById('scroller').style.background=c.page;
  document.getElementById('nav').style.background=c.bg;
  syncNavHeight();
}
function syncNavHeight(){
  const nav=document.getElementById('nav');
  if(!nav) return;
  // Keep the scroll area ending exactly above the rendered nav, including iOS safe-area.
  const h=Math.ceil(nav.getBoundingClientRect().height || 68);
  document.documentElement.style.setProperty('--nav-h', h+'px');
}
window.addEventListener('resize', syncNavHeight, {passive:true});
window.addEventListener('orientationchange', syncNavHeight, {passive:true});

// ─── FOCUS HELPERS ───────────────────────────────────────────────────────────
function fTotal(){return S.fpreset==="Deep Work"?45*60:S.fpreset==="Study"?25*60:30*60;}
function fPct(){return Math.max(0,Math.min(100,Math.round((S.fsec/fTotal())*100)));}
function fStr(){const m=Math.floor(S.fsec/60),s=S.fsec%60;return String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");}
function focusStats(){
  const hist=S.fhistory||[];
  const sessions=hist.length;
  const weekKeys=new Set(focusWeekDays().map(d=>d.key));
  const weekMins=hist.filter(h=>weekKeys.has(h.dateKey)).reduce((sum,h)=>sum+(Number(h.mins)||0),0);
  const avgScore=sessions?Math.round(hist.reduce((sum,h)=>sum+(Number(h.score)||0),0)/sessions):0;
  return {sessions,weekMins,avgScore};
}
function focusWhenLabel(){
  const d=new Date();
  return d.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"});
}
function focusDateKey(d=new Date()){
  const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function focusWeekDays(){
  const now=new Date();
  const day=(now.getDay()+6)%7; // Monday = 0
  const monday=new Date(now);monday.setHours(0,0,0,0);monday.setDate(now.getDate()-day);
  const lit=new Set((S.fhistory||[]).filter(h=>h.dateKey).map(h=>h.dateKey));
  const labels=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  return labels.map((label,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);const key=focusDateKey(d);return {label,key,on:lit.has(key),today:key===focusDateKey(now)};});
}
function persistFocusData(){
  try{localStorage.setItem("cm_focus_data",JSON.stringify({fhistory:S.fhistory,flastSummary:S.flastSummary}));}catch(e){}
}
function loadFocusData(){
  try{
    const raw=localStorage.getItem("cm_focus_data");
    if(!raw)return;
    const d=JSON.parse(raw);
    if(Array.isArray(d.fhistory))S.fhistory=d.fhistory;
    if(d.flastSummary)S.flastSummary=d.flastSummary;
  }catch(e){}
}
function saveFocusSession(done){
  const start=S.fsessionStartSec||fTotal();
  const elapsed=Math.max(0,start-S.fsec);
  const mins=Math.max(1,Math.round(elapsed/60));
  const ratio=start?Math.min(1,elapsed/start):1;
  const score=done?95:Math.max(45,Math.round(55+ratio*40));
  const entry={name:S.fpreset,mins,score,apps:S.fblocked.length,done:!!done,when:focusWhenLabel(),dateKey:focusDateKey(),at:Date.now()};
  S.fhistory=[entry,...(S.fhistory||[])].slice(0,30);
  S.flastSummary=entry;
  S.fsessionStartSec=0;
  S.fsessionStartedAt=null;
  persistFocusData();
  return entry;
}
function focusHistoryRows(t,limit=8){
  const hist=(S.fhistory||[]).slice(0,limit);
  return hist.length?hist.map((h,i)=>`
    <div style="display:flex;align-items:center;gap:12px;${i?"border-top:1px solid "+t.line+";padding-top:11px;":""}">
      <div style="width:36px;height:36px;border-radius:13px;background:${t.surf2};display:grid;place-items:center;font-size:17px;flex-shrink:0">${h.done?"🔥":"✓"}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:800;color:${t.txt};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.name}</div>
        <div style="font-size:12px;color:${t.mut};margin-top:2px">${h.when} · ${h.mins} min · ${h.apps} apps blocked</div>
      </div>
      <div style="font-size:12px;font-weight:800;color:${t.acc};background:${t.surf2};border-radius:999px;padding:5px 8px">${h.score}</div>
    </div>`).join(""):`<div style="border-radius:14px;background:${t.page};border:1px solid ${t.bdr};padding:16px;text-align:center;color:${t.mut};font-size:13px">No saved focus sessions yet.</div>`;
}
// dashoffset: 0 = full ring (100% time left), 578 = empty ring (0% left)
function fDash(){return (578-(fPct()/100)*578).toFixed(1);}

// Update every focus-related DOM node without re-rendering the page
function syncFocusDOM(){
  const ts=fStr(), p=fPct(), dash=fDash(), minsLeft=Math.floor(S.fsec/60);
  const col=TH[S.theme]||TH.dark;

  // Time displays
  document.querySelectorAll(".f-time-el").forEach(el=>el.textContent=ts);
  // Ring
  const fr=document.getElementById("f-ring");
  if(fr) fr.setAttribute("stroke-dashoffset", dash);
  // Pct label
  const fp=document.getElementById("f-pct");
  if(fp) fp.textContent=p+"% session left";
  // Left tile
  const fl=document.getElementById("f-left");
  if(fl) fl.textContent=minsLeft+"m";
  // Preset label inside ring
  document.querySelectorAll(".focus-preset-label").forEach(l=>l.textContent=S.fpreset);

  // Main button — remove onclick attr, set via property to avoid double-fire
  const fb=document.getElementById("f-btn");
  if(fb){
    fb.removeAttribute("onclick");
    fb.onclick= S.frun ? doPause : doStart;
    fb.innerHTML=`${ic(S.frun?"pause":"play",18)} ${S.frun?"Pause":"Start"}`;
  }

  // Status pill text
  const sp=document.getElementById("f-status-pill");
  if(sp){
    sp.innerHTML=`<span style="width:7px;height:7px;border-radius:50%;background:${S.frun?"#00ba7c":col.acc}"></span> ${S.frun?"Session running":S.fsessionStartSec>0?"Session paused":"Ready to lock in"}`;
  }

  // Modal time
  const mt=document.getElementById("m-time");
  if(mt) mt.textContent=ts;
  drawFocusDock(col);
}

function startTimer(){
  stopTimer();
  S.ftimer=setInterval(()=>{
    if(S.fsec<=1){
      stopTimer();
      haptic([10,60,20]);
      S.fsec=0; S.frun=false; S.fimmersive=false;
      if(S.frules.save) saveFocusSession(true);
      syncFocusDOM();
      // Show completion modal
      const col=TH[S.theme]||TH.dark;
      if(S.tab==="focus") renderPage(col,false,false);
      S.fmodal=true;
      drawModals(col);
      drawFocusLive(col);
    } else {
      S.fsec--;
      syncFocusDOM();
    }
  },1000);
}

function stopTimer(){
  if(S.ftimer){clearInterval(S.ftimer);S.ftimer=null;}
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function doNav(id){
  if(id===S.tab){document.getElementById("scroller").scrollTo({top:0,behavior:"smooth"});return;}
  haptic([4]);
  upd({tab:id});
}

function doPreset(name,mins){
  if(S.frun) return; // don't switch preset mid-session
  stopTimer();
  haptic([4]);
  S.fpreset=name;
  S.fsec=mins*60;
  S.frun=false;
  S.fsessionStartSec=0;
  S.fsessionStartedAt=null;
  const col=TH[S.theme]||TH.dark;
  // Swap preset button styles
  document.querySelectorAll(".preset").forEach(btn=>{
    const isThis=btn.dataset.preset===name;
    btn.style.borderColor=isThis?col.acc:col.bdr;
    btn.style.background=isThis?col.surf2:col.surf;
    const chk=btn.querySelector(".preset-check");
    if(chk) chk.style.display=isThis?"grid":"none";
  });
  syncFocusDOM();
  drawModals(col);
}

function doStart(){
  if(S.fsec<=0) S.fsec=fTotal();
  if(S.fsessionStartSec>0){
    beginFocusSession();
    return;
  }
  S.fstartConfirm=true;
  drawModals(c());
}

function beginFocusSession(){
  if(S.fsec<=0) S.fsec=fTotal();
  if(!S.fsessionStartSec){S.fsessionStartSec=S.fsec;S.fsessionStartedAt=Date.now();}
  haptic([6,50,10]);
  S.fstartConfirm=false;
  S.fimmersive=true;
  S.frun=true;
  syncFocusDOM();
  startTimer();
  drawModals(c());
  drawFocusLive(c());
  drawFocusDock(c());
}

function addFocusTime(mins){
  S.fsec+=mins*60;
  if(S.fsessionStartSec)S.fsessionStartSec+=mins*60;
  haptic([4]);
  syncFocusDOM();
  drawFocusLive(c());
}

function exitFocusLive(){
  S.fimmersive=false;
  const col=c();
  drawFocusLive(col);
  drawFocusDock(col);
}

function doPause(){
  stopTimer();
  haptic([4]);
  S.frun=false;
  S.fimmersive=true; // stay inside the immersive focus screen while paused
  syncFocusDOM();
  const col=TH[S.theme]||TH.dark;
  drawModals(col);
  drawFocusLive(col);
  drawFocusDock(col);
}

function doReset(){
  stopTimer();
  haptic([4]);
  S.frun=false;
  S.fimmersive=false;
  S.fsec=fTotal();
  S.fsessionStartSec=0;
  S.fsessionStartedAt=null;
  syncFocusDOM();
  const col=TH[S.theme]||TH.dark;
  drawModals(col);
  drawFocusLive(col);
}

function doEndSession(){
  const hadProgress=S.fsessionStartSec>0 && S.fsessionStartSec>S.fsec;
  stopTimer();
  haptic([10,50,10]);
  S.frun=false;
  S.fimmersive=false;
  if(hadProgress&&S.frules.save) saveFocusSession(S.fsec<=0);
  S.fsec=fTotal();
  S.fsessionStartSec=0;
  S.fsessionStartedAt=null;
  const col=TH[S.theme]||TH.dark;
  if(S.tab==="focus") renderPage(col,false,false);
  drawModals(col);
  drawFocusLive(col);
}

function toggleRule(key){
  const r={...S.frules};r[key]=!r[key];
  // Update only the toggle in DOM without re-rendering whole page
  const btn=document.querySelector(`button[onclick="toggleRule('${key}')"]`);
  if(btn){
    const on=r[key];
    btn.className="tog"+(on?" on":" off");
    btn.style.background=on?c().acc:"";
    btn.style.cssText+=on?`background:${c().acc};`:"background:#71767b;";
    btn.classList.toggle("on",on);btn.classList.toggle("off",!on);
  }
  S.frules=r;
}

function focusIsActive(){return S.frun || (S.fsessionStartSec>0 && S.fsessionStartSec>S.fsec);}
function restoreFocusLive(){
  if(!focusIsActive())return;
  S.fimmersive=true;
  const col=c();
  drawFocusLive(col);
  drawFocusDock(col);
}
function drawFocusDock(t){
  const el=document.getElementById("focus-dock");
  if(!el)return;
  if(!focusIsActive() || S.fimmersive){el.className="focus-dock";el.innerHTML="";return;}
  const paused=!S.frun;
  el.className="focus-dock open"+(paused?" focus-dock-paused":"");
  el.innerHTML=`
    <div class="focus-dock-card">
      <div class="focus-dock-pulse"></div>
      <div style="flex:1;min-width:0;text-align:left">
        <div class="focus-dock-title">${paused?"Focus paused":"Focus running"}</div>
        <div class="focus-dock-time f-time-el">${fStr()}</div>
      </div>
      <button class="focus-dock-action" onclick="restoreFocusLive()">Return</button>
    </div>`;
}
function drawFocusLive(t){
  const el=document.getElementById("focus-live");
  const shell=document.getElementById("shell");
  if(shell) shell.classList.toggle("focus-immersive", !!S.fimmersive);
  if(!el)return;
  if(!S.fimmersive){el.className="focus-live";el.innerHTML="";return;}
  const paused=!S.frun;
  el.className="focus-live open"+(paused?" paused":"");
  el.innerHTML=`
    <div class="focus-warp"></div><div class="focus-orb"></div><div class="focus-orb two"></div><div class="focus-orb three"></div>
    <div class="focus-live-inner">
      <div class="focus-live-top">
        <div class="focus-live-chip">${S.fpreset}</div>
        <div class="focus-live-status">${paused?"Paused":"Focus Active"}</div>
      </div>

        <div class="focus-mini-actions">
          <button class="focus-mini-btn" onclick="addFocusTime(5)">+5</button>
          <button class="focus-mini-btn" onclick="addFocusTime(15)">+15</button>
          <button class="focus-mini-btn">${S.fblocked.length} blocked</button>
        </div>
      </div>
      <div style="width:100%">
        <div class="focus-control-row">
          <button class="focus-side-btn focus-live-end" onclick="doEndSession()">End</button>
          <button class="focus-icon-btn" onclick="${S.frun?'doPause()':'doStart()'}" aria-label="${S.frun?'Pause':'Resume'}">
            ${ic(S.frun?"pause":"play",30)}

        </div>
        <div class="focus-pause-note">${paused?"Tap play to continue the session.":"One clean screen. No distractions."}</div>
      </div>
    </div>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
let prevTab="", prevTheme="";

function renderPage(t, tabChanged, themeChanged){
  let html="";
  if(S.tab==="insights") html=pageInsights();
  else if(S.tab==="focus") html=pageFocus();
  else if(S.tab==="limits") html=pageLimits();
  else if(S.tab==="profile") html=pageProfile();
  else html=pageHome();

  document.getElementById("page").innerHTML=html;
  const wrap=document.getElementById("page-wrap");
  if(wrap&&themeChanged&&!tabChanged) wrap.classList.add("no-anim");
  if(tabChanged) document.getElementById("scroller").scrollTop=0;
  prevTab=S.tab; prevTheme=S.theme;
  wireFocusBtn();
  drawFocusDock(t);
}

    </div>
    <div style="background:${t.surf2};border-radius:16px;overflow:hidden;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px;padding:14px"><span style="font-size:22px;flex-shrink:0">📱</span><div style="font-size:14px;color:${t.txt};line-height:1.4"><b>iPhone / iPad</b><br>Tap <b>Share</b> → <b>Add to Home Screen</b></div></div>
      <div style="display:flex;align-items:center;gap:12px;padding:14px;border-top:1px solid ${t.line}"><span style="font-size:22px;flex-shrink:0">🤖</span><div style="font-size:14px;color:${t.txt};line-height:1.4"><b>Android</b><br>Tap <b>⋮ Menu</b> → <b>Install app</b></div></div>
    </div>
    <button onclick="closeInst()" style="width:100%;border-radius:16px;padding:14px;font-size:15px;font-weight:600;color:${t.txt};background:${t.surf2};border:1px solid ${t.bdr}">Got it</button>`;
  requestAnimationFrame(()=>requestAnimationFrame(()=>bg.classList.add("open")));
}
function closeInst(){document.getElementById("inst-bg").classList.remove("open");}

// ─── SWIPE & TOUCH ───────────────────────────────────────────────────────────
let tx0=0,ty0=0;
const scr=document.getElementById("scroller");
scr.addEventListener("touchstart",e=>{tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;},{passive:true});
scr.addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-tx0, dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.8){
    const idx=TABS.findIndex(tab=>tab.id===S.tab);
    if(dx<0&&idx<TABS.length-1)doNav(TABS[idx+1].id);
    else if(dx>0&&idx>0)doNav(TABS[idx-1].id);
  }
},{passive:true});
document.addEventListener("touchmove",e=>{
  if(!e.target.closest("#scroller,.modal-sheet,.inst-sheet,.notif-inner,.add-limit-sheet,.focus-live"))e.preventDefault();
},{passive:false});

// ─── PWA ─────────────────────────────────────────────────────────────────────
function initPWA(){
  const t=TH[S.theme]||TH.dark;
  if("serviceWorker" in navigator){
    const sw=`const V='cm3';self.addEventListener('install',e=>e.waitUntil(caches.open(V)));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('<h1>ClearMind — Offline</h1>',{headers:{'Content-Type':'text/html'}})))))`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
  }
  const iconSvg=encodeURIComponent(`<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='%23000'/><text x='256' y='312' text-anchor='middle' font-size='176' font-family='-apple-system,sans-serif' font-weight='800' fill='%231d9bf0'>CM</text></svg>`);
  const iconUrl=`data:image/svg+xml,${iconSvg}`;
  const manifest={name:"ClearMind",short_name:"ClearMind",description:"Mindful screen time tracking",start_url:".",display:"standalone",orientation:"portrait-primary",background_color:t.bg,theme_color:t.bg,categories:["health","lifestyle"],icons:[{src:iconUrl,sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"},{src:iconUrl,sizes:"192x192",type:"image/svg+xml",purpose:"any maskable"}]};
  const mBlob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
  let ml=document.querySelector('link[rel="manifest"]');
  if(!ml){ml=document.createElement("link");ml.rel="manifest";document.head.appendChild(ml);}
  ml.href=URL.createObjectURL(mBlob);
  let ai=document.querySelector('link[rel="apple-touch-icon"]');
  if(!ai){ai=document.createElement("link");ai.rel="apple-touch-icon";document.head.appendChild(ai);}
  ai.href=iconUrl;
  window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();S.deferred=e;upd({});});
  window.addEventListener("appinstalled",()=>upd({installed:true,deferred:null}));
  if(window.matchMedia&&window.matchMedia("(display-mode: standalone)").matches)S.installed=true;
}

// ─── EXPOSE ──────────────────────────────────────────────────────────────────
Object.assign(window,{upd,doNav,doPreset,doStart,beginFocusSession,addFocusTime,exitFocusLive,doPause,doReset,doEndSession,haptic,doInstall,closeModal,closeInst,openNotif,closeNotif,openFocusDetail,closeFocusDetail,goFocusInsights,openAddLimit,closeAddLimit,confirmAddLimit,pickMins,removeLimit,toggleRule,handleSetting,openProfileSheet,wireFocusBtn,syncFocusDOM});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadFocusData();
initPWA();
const _t=TH[S.theme];
applyTheme(_t);
drawNav(_t);
renderPage(_t,true,false);
drawModals(_t);
drawNotif(_t);
</script>
